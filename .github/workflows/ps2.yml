name: PS2 build

# Builds the PlayStation 2 port in the official ps2dev toolchain and uploads
# the ELF. No WAD is embedded, so the artifact contains no game data and is
# safe to publish; supply a WAD at runtime.

on:
  push:
    branches: [ master, ps2-port ]
    paths: [ 'ps2/**', 'doomgeneric/**', 'Dockerfile', '.github/workflows/ps2.yml' ]
  pull_request:
    paths: [ 'ps2/**', 'doomgeneric/**' ]
  workflow_dispatch:

jobs:
  ps2-elf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Run the build inside the ps2dev image (full PS2 toolchain + SDL2/gsKit/
      # audsrv). checkout runs on the host so we don't need node in the
      # Alpine-based toolchain image. Build both video backends (no WAD).
      - name: Build PS2 ELFs (SDL + gsKit video)
        run: |
          docker run --rm -v "$PWD:/work" -w /work/ps2 \
            ghcr.io/ps2dev/ps2dev:latest \
            sh -c '
              set -e
              apk add --no-cache make bash >/dev/null
              make && cp doomgeneric.elf doomgeneric-sdl.elf
              make clean && make GSKIT_VIDEO=1 && cp doomgeneric.elf doomgeneric-gskit.elf
            '

      - name: Upload ELFs
        uses: actions/upload-artifact@v4
        with:
          name: doomgeneric-ps2
          path: |
            ps2/doomgeneric-sdl.elf
            ps2/doomgeneric-gskit.elf
          if-no-files-found: error
